# 🐳 Zero-Cost Video Pipeline | Docker Compose (v0.3)
# Готовый «рецепт» для запуска проекта в изолированном контейнере.
# Принцип: "Одна команда — и проект работает на любом компьютере без установки зависимостей."

version: "3.8"

services:
  video-pipeline:
    # Базовый образ: лёгкий Python 3.11
    image: python:3.11-slim

    # Рабочая директория внутри контейнера
    working_dir: /app

    # Монтирование папок: связываем локальные папки с контейнером
    volumes:
      - .:/app               # Исходный код проекта
      - ./output:/app/output # Папка для готовых видео
      - ./cache:/app/cache   # Кэш промптов и метаданных
      - ./models:/app/models # Папка для моделей (заполнится позже)
      - ./temp:/app/temp     # Временные файлы

    # Переменные окружения
    environment:
      - PYTHONUNBUFFERED=1      # Логи выводятся сразу, без буферизации
      - HF_DATASETS_OFFLINE=1   # Отключаем фоновые запросы к HuggingFace
      - TRANSFORMERS_OFFLINE=0  # Разрешаем загрузку моделей при необходимости
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860

    # Проброс порта для веб-интерфейса
    ports:
      - "7860:7860"

    # Команда запуска: установка зависимостей → запуск app.py
    command: >
      bash -c "
        pip install --no-cache-dir -r requirements.txt &&
        python app.py
      "

    # Ограничение ресурсов (CPU-Only философия)
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

    # Автоматический перезапуск при ошибке
    restart: unless-stopped
